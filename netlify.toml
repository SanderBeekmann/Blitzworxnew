[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"

# Next.js API routes run as Netlify Functions.
# PageSpeed Insights API can take 10-30s, default 10s timeout is too short.
[functions."___netlify-server-handler"]
  timeout = 60

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https://images.unsplash.com https://placehold.co https://www.googletagmanager.com blob:; connect-src 'self' https://oldreitxkoplawcswzbx.supabase.co https://www.googleapis.com https://moneybird.com https://www.google-analytics.com https://analytics.google.com; frame-src 'none'; object-src 'none'; base-uri 'self'"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
